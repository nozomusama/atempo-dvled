<style>
  :root {
    --bg-0: #05060A;
    --bg-1: #0A0C12;
    --bg-2: #10131C;
    --bg-3: #181C28;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.14);
    --text-0: #F4F5F8;
    --text-1: #B8BCC8;
    --text-2: #7A7F8E;
    --text-3: #4A4F5E;
    --magenta: #E6007E;
    --magenta-glow: rgba(230, 0, 126, 0.45);
    --cyan: #00E5FF;
    --cyan-glow: rgba(0, 229, 255, 0.35);
    --amber: #FFB020;
    --success: #00D68F;

    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --container: 1360px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg-0);
    color: var(--text-0);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  ::selection { background: var(--magenta); color: white; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-0); }
  ::-webkit-scrollbar-thumb { background: #2a2e3e; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3e4e; }

  /* Utility */
  .container { max-width: var(--container); margin: 0 auto; padding: 0 32px; }
  .mono { font-family: var(--font-mono); letter-spacing: 0.02em; }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-2);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--magenta);
  }

  .display-xl {
    font-family: var(--font-display);
    font-size: clamp(48px, 7vw, 104px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    font-weight: 500;
  }
  .display-l {
    font-family: var(--font-display);
    font-size: clamp(36px, 4.5vw, 64px);
    line-height: 1.02;
    letter-spacing: -0.028em;
    font-weight: 500;
  }
  .display-m {
    font-family: var(--font-display);
    font-size: clamp(28px, 3vw, 40px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    font-weight: 500;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 22px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    border-radius: 2px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--magenta);
    color: white;
  }
  .btn-primary:hover {
    background: #ff1a95;
    box-shadow: 0 0 0 1px var(--magenta), 0 8px 32px var(--magenta-glow);
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-0);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover { border-color: var(--text-0); background: rgba(255,255,255,0.04); }

  /* LED panel simulated backdrop */
  .led-grid-bg {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 8px 8px;
  }

  /* Hero LED video wall */
  @keyframes ledPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes sweepBar {
    0% { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }
  @keyframes tickerSlide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes gridShift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(4px, -4px); }
  }

  .section {
    padding: 120px 0;
    position: relative;
  }
  .section-sm { padding: 80px 0; }

  .bg-light {
    background: #F4F5F8;
    color: #05060A;
  }
  .bg-light .eyebrow { color: #6A6F7E; }
  .bg-light .eyebrow::before { background: var(--magenta); }

  .bg-darker { background: var(--bg-1); }

  .divider {
    height: 1px;
    background: var(--line);
    width: 100%;
  }

  /* Section header pattern */
  .section-header {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 48px;
    align-items: end;
    margin-bottom: 72px;
  }
  .section-header .lead {
    font-size: 18px;
    line-height: 1.5;
    color: var(--text-1);
    max-width: 560px;
  }
  .bg-light .section-header .lead { color: #3a3f4e; }

  @media (max-width: 900px) {
    .section-header { grid-template-columns: 1fr; gap: 20px; }
    .section { padding: 80px 0; }
  }

  /* Loading skeleton for root */
  #root-loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-0);
    z-index: 9999;
  }
  #root-loading .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--magenta);
    animation: ledPulse 1.2s ease-in-out infinite;
  }
</style>
</head>
