<svg xmlns="http://www.w3.org/2000/svg" width="600" height="480" viewBox="0 0 600 480">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1e2e"/>
      <stop offset="100%" stop-color="#0f1018"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="600" height="480" fill="#fff"/>
  <!-- shadow -->
  <ellipse cx="300" cy="462" rx="35.699999999999996" ry="10" fill="#000" opacity="0.07"/>
  <g filter="url(#sh)">
    <!-- LED face strip -->
    <rect x="274.5" y="90" width="4" height="360" fill="#9333EA" rx="1"/>
    <!-- cabinet body -->
    <rect x="278.5" y="90" width="47" height="360" fill="url(#bodyG)" rx="1"/>
  </g>
  <!-- face glow -->
  <rect x="268.5" y="126" width="6" height="288" fill="#9333EA" opacity="0.10" rx="3"/>
  <!-- top connector bump -->
  <rect x="323.5" y="378" width="8" height="54" rx="2" fill="#252836"/>
  <!-- depth arrow -->
  <line x1="274.5" y1="486" x2="325.5" y2="486" stroke="#999" stroke-width="1.2"/>
  <line x1="274.5" y1="481" x2="274.5" y2="491" stroke="#999" stroke-width="1.2"/>
  <line x1="325.5" y1="481" x2="325.5" y2="491" stroke="#999" stroke-width="1.2"/>
  <text x="300" y="502" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="1">38mm DEPTH</text>
  <!-- face label -->
  <text x="264.5" y="270" font-family="'Helvetica Neue',Arial,sans-serif" font-size="9" fill="#9333EA" text-anchor="middle" transform="rotate(-90,264.5,270)" letter-spacing="2" opacity="0.7">LED FACE</text>
</svg>