<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg-0:#05060A; --bg-1:#0A0C12; --bg-2:#10131C; --bg-3:#181C28;
  --line:rgba(255,255,255,0.08); --line-strong:rgba(255,255,255,0.14);
  --text-0:#F4F5F8; --text-1:#B8BCC8; --text-2:#7A7F8E; --text-3:#4A4F5E;
  --magenta:#E6007E; --magenta-glow:rgba(230,0,126,0.45); --cyan:#00E5FF;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --container:1360px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--bg-0);color:var(--text-0);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--magenta);color:white;}
::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-track{background:var(--bg-0);} ::-webkit-scrollbar-thumb{background:#2a2e3e;border-radius:5px;}
.container{max-width:var(--container);margin:0 auto;padding:0 32px;}
.mono{font-family:var(--font-mono);letter-spacing:0.02em;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;font-size:13px;font-weight:500;border-radius:2px;transition:all 0.2s;white-space:nowrap;}
.btn-primary{background:var(--magenta);color:white;}
.btn-primary:hover{background:#ff1a95;box-shadow:0 8px 32px var(--magenta-glow);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--text-0);border:1px solid var(--line-strong);}
.btn-ghost:hover{border-color:var(--text-0);background:rgba(255,255,255,0.04);}
.display-xl{font-family:var(--font-display);font-size:clamp(40px,6vw,88px);line-height:0.95;letter-spacing:-0.035em;font-weight:500;}
.display-l{font-family:var(--font-display);font-size:clamp(32px,4vw,56px);line-height:1.02;letter-spacing:-0.028em;font-weight:500;}
.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-2);display:inline-flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--magenta);}
@keyframes ledPulse{0%,100%{opacity:0.8;}50%{opacity:1;}}
#root-loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg-0);z-index:9999;}
#root-loading .dot{width:8px;height:8px;border-radius:50%;background:var(--magenta);animation:ledPulse 1.2s ease-in-out infinite;}
</style>
</head>
<body>
<div id="root-loading"><div class="dot"></div></div>
<div id="root"></div>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="product/productData.jsx"></script>
<script type="text/babel" src="product/BrochurePDF.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel" src="components/WhatsApp.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const SERIES_COLORS = {

const DOWNLOADS_TR = [
  // Teknik Broşürler
  { id:1, cat:'brochure', series:'AX', title:'AX IndoorFine — Ürün Broşürü', desc:'COB mikro-pitch iç mekan serisi. Kontrol odası ve kurumsal lobbiler.', type:'PDF', size:'4.2 MB', version:'v3.1', date:'2025-11', lang:'TR/EN' },
  { id:2, cat:'brochure', series:'BX', title:'BX Broadcast — Ürün Broşürü', desc:'Broadcast ve XR sanal set serisi. Kamera-uyumlu, 7680 Hz refresh.', type:'PDF', size:'5.8 MB', version:'v2.4', date:'2026-01', lang:'TR/EN' },
  { id:3, cat:'brochure', series:'CX', title:'CX Corporate — Ürün Broşürü', desc:'Auditorium ve konferans salonu LED video duvarı serisi.', type:'PDF', size:'3.9 MB', version:'v2.0', date:'2025-10', lang:'TR/EN' },
  { id:4, cat:'brochure', series:'DX', title:'DX Stage — Ürün Broşürü', desc:'Etkinlik ve konser için touring kiralama serisi. IP54, 4500 nit.', type:'PDF', size:'4.4 MB', version:'v1.8', date:'2025-09', lang:'TR/EN' },
  { id:5, cat:'brochure', series:'EX', title:'EX Outdoor — Ürün Broşürü', desc:'IP65 dış mekan digital signage ve DOOH serisi. 6000 nit.', type:'PDF', size:'5.1 MB', version:'v2.2', date:'2025-12', lang:'TR/EN' },
  { id:6, cat:'brochure', series:'FX', title:'FX Creative — Ürün Broşürü', desc:'Esnek, kavisli ve şekilli LED modül serisi. Sütun, zemin, tavan.', type:'PDF', size:'6.3 MB', version:'v1.5', date:'2026-01', lang:'TR/EN' },
  { id:7, cat:'brochure', series:'ALL', title:'Atempo DirectView LED — Genel Katalog 2026', desc:'Tüm seri ve ürünlerin genel bakışı, karşılaştırma tablosu ve referanslar.', type:'PDF', size:'18.7 MB', version:'2026 Ed.', date:'2026-02', lang:'TR/EN' },
  // Teknik Çizimler
  { id:8, cat:'drawing', series:'AX', title:'AX Serisi — Montaj ve Boyut Çizimleri', desc:'Modül boyutları, dolap çizimi, montaj detayları. DXF + PDF.', type:'DXF+PDF', size:'2.1 MB', version:'r4', date:'2025-11', lang:'-' },
  { id:9, cat:'drawing', series:'BX', title:'BX Serisi — Montaj ve Boyut Çizimleri', desc:'Flybar, kutu ve modül boyutları. DXF + PDF.', type:'DXF+PDF', size:'1.9 MB', version:'r3', date:'2025-10', lang:'-' },
  { id:10, cat:'drawing', series:'CX', title:'CX Serisi — Montaj ve Boyut Çizimleri', desc:'Duvar ve raf montaj detayları. DXF + PDF.', type:'DXF+PDF', size:'1.7 MB', version:'r2', date:'2025-08', lang:'-' },
  { id:11, cat:'drawing', series:'DX', title:'DX Serisi — Rigging ve Montaj Çizimleri', desc:'Flybar, touring case boyutları. Yük hesabı notları dahil.', type:'DXF+PDF', size:'3.2 MB', version:'r5', date:'2025-12', lang:'-' },
  { id:12, cat:'drawing', series:'EX', title:'EX Serisi — Dış Mekan Kurulum Çizimleri', desc:'Hava koşullarına dayanıklı kasa, kablo giriş detayları.', type:'DXF+PDF', size:'2.8 MB', version:'r3', date:'2025-11', lang:'-' },
  { id:13, cat:'drawing', series:'ALL', title:'Standart Video Duvarı Elektrik Şeması', desc:'Tipik kurulum için güç dağıtımı ve bağlantı şeması.', type:'PDF', size:'1.1 MB', version:'r6', date:'2025-07', lang:'-' },
  // Yazılımlar
  { id:14, cat:'software', series:'ALL', title:'NovaLCT LED Kontrolör Yazılımı', desc:'LED panel kalibrasyonu, renk ayarı ve kontrol. Windows 10/11.', type:'EXE', size:'248 MB', version:'v5.4.2', date:'2025-12', lang:'TR/EN/DE' },
  { id:15, cat:'software', series:'ALL', title:'Atempo LED Manager', desc:'Sahne kurulum yönetimi, gruplama, zamanlama ve içerik yönetimi.', type:'EXE', size:'87 MB', version:'v2.1.0', date:'2026-01', lang:'TR/EN' },
  { id:16, cat:'software', series:'ALL', title:'ColorGenie Kalibrasyon Yazılımı', desc:'Gelişmiş renk ve parlaklık kalibrasyonu. Spektrofotometre desteği.', type:'EXE', size:'142 MB', version:'v3.0.1', date:'2025-10', lang:'EN' },
  { id:17, cat:'software', series:'ALL', title:'Sürücü Paketi — Windows 10/11', desc:'LED kontrol kartı USB ve ethernet sürücüleri.', type:'ZIP', size:'12 MB', version:'v2024.11', date:'2024-11', lang:'-' },
  // Firmware
  { id:18, cat:'firmware', series:'AX', title:'AX Serisi — Alıcı Kartı Firmware', desc:'Performans ve kararlılık güncellemeleri. Release notları dahil.', type:'BIN', size:'8.4 MB', version:'v6.2.1', date:'2025-12', lang:'-' },
  { id:19, cat:'firmware', series:'BX', title:'BX Serisi — Broadcast Kart Firmware', desc:'Genlock ve tracking stabilite iyileştirmeleri.', type:'BIN', size:'9.1 MB', version:'v4.3.0', date:'2026-01', lang:'-' },
  { id:20, cat:'firmware', series:'CX', title:'CX/DX/FX — Alıcı Kartı Firmware', desc:'Ortak platform kartları için toplu firmware paketi.', type:'BIN', size:'7.8 MB', version:'v5.8.4', date:'2025-11', lang:'-' },
  { id:21, cat:'firmware', series:'EX', title:'EX Serisi — Outdoor Kontrol Firmware', desc:'Sıcaklık yönetimi ve otomatik parlaklık algoritması güncellemesi.', type:'BIN', size:'6.2 MB', version:'v3.1.2', date:'2025-09', lang:'-' },
  { id:22, cat:'firmware', series:'ALL', title:'MCTRL Kontrol Kutusu Firmware', desc:'Tüm seri uyumlu video kontrol birimi firmware.', type:'BIN', size:'14.3 MB', version:'v9.0.3', date:'2025-12', lang:'-' },
  // Ürün Fotoğrafları
  { id:23, cat:'photo', series:'AX', title:'AX IndoorFine — Ürün Fotoğrafları', desc:'Stüdyo ve kurulum fotoğrafları. Modül, kasa, kontrol kartı. 300 DPI.', type:'ZIP', size:'142 MB', version:'2026', date:'2026-01', lang:'-' },
  { id:24, cat:'photo', series:'BX', title:'BX Broadcast — Stüdyo Fotoğrafları', desc:'XR stüdyo kurulum, close-up modül ve panel fotoğrafları.', type:'ZIP', size:'186 MB', version:'2026', date:'2026-01', lang:'-' },
  { id:25, cat:'photo', series:'CX', title:'CX Corporate — Kurulum Fotoğrafları', desc:'Kurumsal referans kurulumlarından yüksek çözünürlüklü görseller.', type:'ZIP', size:'98 MB', version:'2025', date:'2025-10', lang:'-' },
  { id:26, cat:'photo', series:'DX', title:'DX Stage — Etkinlik Fotoğrafları', desc:'Konser ve festival kurulumlarından sahne fotoğrafları.', type:'ZIP', size:'224 MB', version:'2025', date:'2025-09', lang:'-' },
  { id:27, cat:'photo', series:'ALL', title:'Atempo DirectView LED — Basın Kiti', desc:'Logo, marka görselleri, ürün fotoğrafları ve açıklama metinleri. Tüm seriler.', type:'ZIP', size:'312 MB', version:'2026', date:'2026-02', lang:'-' },
];

const CAT_META = {
  brochure: { label:'Teknik Broşürler', icon: <BrochureIcon />, color:'#E6007E' },
  drawing:  { label:'Teknik Çizimler', icon: <DrawingIcon />, color:'#00E5FF' },
  software: { label:'Yazılımlar', icon: <SoftwareIcon />, color:'#6A5ACD' },
  firmware: { label:'Firmware', icon: <FirmwareIcon />, color:'#FF6A00' },
  photo:    { label:'Ürün Fotoğrafları', icon: <PhotoIcon />, color:'#9333EA' },
};

const SERIES_LIST = ['ALL','AX','BX','CX','DX','EX','FX'];

// ── ICONS ─────────────────────────────────────────────────────────────────────
function BrochureIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="4" y="2" width="12" height="16" rx="1" stroke="currentColor" strokeWidth="1.3"/><path d="M7 7 L13 7 M7 10 L13 10 M7 13 L11 13" stroke="currentColor" strokeWidth="1.3"/></svg>;
}
function DrawingIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" stroke="currentColor" strokeWidth="1.3"/><path d="M3 8 L17 8 M8 3 L8 17" stroke="currentColor" strokeWidth="1" strokeDasharray="2 2"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/></svg>;
}
function SoftwareIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="12" rx="1" stroke="currentColor" strokeWidth="1.3"/><path d="M6 9 L9 12 L14 7" stroke="currentColor" strokeWidth="1.3"/></svg>;
}
function FirmwareIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="5" y="5" width="10" height="10" stroke="currentColor" strokeWidth="1.3"/><circle cx="10" cy="10" r="2" fill="currentColor"/><path d="M10 2 L10 5 M10 15 L10 18 M2 10 L5 10 M15 10 L18 10" stroke="currentColor" strokeWidth="1.3"/></svg>;
}
function PhotoIcon() {
  return <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="12" rx="1" stroke="currentColor" strokeWidth="1.3"/><circle cx="10" cy="11" r="3" stroke="currentColor" strokeWidth="1.3"/><path d="M7 5 L8 3 L12 3 L13 5" stroke="currentColor" strokeWidth="1.3"/></svg>;
}
function DownloadIcon() {
  return <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2 L7 9 M4 7 L7 10 L10 7 M2 12 L12 12" stroke="currentColor" strokeWidth="1.4"/></svg>;
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function DownloadsApp() {
  const [lang, setLang] = useState('tr');
  const [activeCat, setActiveCat] = useState('all');
  const [activeSeries, setActiveSeries] = useState('ALL');
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState('');
  const t = window.I18N[lang];

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 3000);
  };

  const handleDownload = (d) => {
    if (d.cat === 'brochure' && d.series !== 'ALL' && window.generateBrochure && window.PRODUCTS) {
      window.generateBrochure(window.PRODUCTS[d.series], lang).catch(console.error);
    } else {
      showToast(lang === 'tr' ? 'Bu dosya yakında erişime açılacak.' : 'This file will be available soon.');
    }
  };

  const filtered = useMemo(() => {
    return DOWNLOADS_TR.filter(d => {
      const catOk = activeCat === 'all' || d.cat === activeCat;
      const seriesOk = activeSeries === 'ALL' || d.series === activeSeries || d.series === 'ALL';
      const q = search.toLowerCase();
      const searchOk = !q || d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q);
      return catOk && seriesOk && searchOk;
    });
  }, [activeCat, activeSeries, search]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(d => {
      if (!g[d.cat]) g[d.cat] = [];
      g[d.cat].push(d);
    });
    return g;
  }, [filtered]);

  return (
    <div>
      <Nav lang={lang} setLang={setLang} t={t} />
      {toast && (
        <div style={{
          position: 'fixed', bottom: 32, left: '50%', transform: 'translateX(-50%)',
          background: '#1a1c28', border: '1px solid rgba(255,255,255,0.12)',
          color: '#F4F5F8', padding: '12px 24px', borderRadius: 8, zIndex: 9999,
          fontFamily: 'var(--font-mono)', fontSize: 13, letterSpacing: '0.04em',
          boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
        }}>{toast}</div>
      )}

      {/* Hero */}
      <section style={{
        paddingTop: 72, minHeight: 360,
        background: 'radial-gradient(ellipse 80% 60% at 50% 30%, #12141f 0%, #05060a 70%)',
        position: 'relative', overflow: 'hidden',
        display: 'flex', alignItems: 'flex-end',
      }}>
        <div style={{ position: 'absolute', inset: 0,
          backgroundImage: 'radial-gradient(circle at 1.5px 1.5px, rgba(230,0,126,0.18) 1.2px, transparent 1.2px)',
          backgroundSize: '10px 10px',
          maskImage: 'radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent 70%)',
          WebkitMaskImage: 'radial-gradient(ellipse 80% 60% at 50% 40%, black, transparent 70%)',
        }} />
        <div style={{ position: 'absolute', top: '10%', right: '15%', width: 400, height: 400,
          background: 'radial-gradient(circle, rgba(230,0,126,0.2), transparent 70%)', filter: 'blur(60px)' }} />
        <div className="container" style={{ position: 'relative', zIndex: 2, paddingBottom: 64, paddingTop: 80 }}>
          <div className="eyebrow" style={{ marginBottom: 20 }}>Atempo DirectView LED</div>
          <h1 className="display-xl" style={{ marginBottom: 20 }}>
            {lang === 'tr' ? 'İndirmeler' : 'Downloads'}
          </h1>
          <p style={{ fontSize: 18, color: 'var(--text-1)', maxWidth: 560 }}>
            {lang === 'tr'
              ? 'Teknik broşürler, çizimler, yazılımlar, firmware ve ürün görselleri.'
              : 'Technical brochures, drawings, software, firmware and product images.'}
          </p>
        </div>
      </section>

      {/* Filter bar */}
      <div style={{ background: 'var(--bg-1)', borderBottom: '1px solid var(--line)', position: 'sticky', top: 72, zIndex: 50 }}>
        <div className="container" style={{ display: 'flex', alignItems: 'center', gap: 0, overflowX: 'auto', height: 60 }}>
          {/* Category tabs */}
          <button onClick={() => setActiveCat('all')} style={{
            padding: '0 20px', height: '100%', fontFamily: 'var(--font-mono)', fontSize: 11,
            letterSpacing: '0.15em', textTransform: 'uppercase', whiteSpace: 'nowrap',
            borderBottom: activeCat === 'all' ? '2px solid var(--magenta)' : '2px solid transparent',
            color: activeCat === 'all' ? 'var(--text-0)' : 'var(--text-2)',
            transition: 'all 0.15s',
          }}>{lang === 'tr' ? 'Tümü' : 'All'}</button>
          {Object.entries(CAT_META).map(([k, v]) => (
            <button key={k} onClick={() => setActiveCat(k)} style={{
              padding: '0 20px', height: '100%', fontFamily: 'var(--font-mono)', fontSize: 11,
              letterSpacing: '0.15em', textTransform: 'uppercase', whiteSpace: 'nowrap',
              display: 'flex', alignItems: 'center', gap: 8,
              borderBottom: activeCat === k ? `2px solid ${v.color}` : '2px solid transparent',
              color: activeCat === k ? 'var(--text-0)' : 'var(--text-2)',
              transition: 'all 0.15s',
            }}>
              <span style={{ color: activeCat === k ? v.color : 'inherit' }}>{v.icon}</span>
              {v.label}
            </button>
          ))}

          {/* Spacer */}
          <div style={{ flex: 1 }} />

          {/* Search */}
          <div style={{ position: 'relative', flexShrink: 0 }}>
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder={lang === 'tr' ? 'Ara...' : 'Search...'}
              style={{
                background: 'var(--bg-2)', border: '1px solid var(--line-strong)',
                color: 'var(--text-0)', padding: '8px 16px 8px 36px',
                fontFamily: 'var(--font-body)', fontSize: 13,
                outline: 'none', width: 200,
              }} />
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-3)' }}>
              <circle cx="6" cy="6" r="4" stroke="currentColor" strokeWidth="1.3"/>
              <path d="M9 9 L12 12" stroke="currentColor" strokeWidth="1.3"/>
            </svg>
          </div>
        </div>
      </div>

      {/* Series filter */}
      <div style={{ background: 'var(--bg-2)', borderBottom: '1px solid var(--line)' }}>
        <div className="container" style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '12px 32px', overflowX: 'auto' }}>
          {SERIES_LIST.map(s => (
            <button key={s} onClick={() => setActiveSeries(s)} style={{
              padding: '6px 16px', fontFamily: 'var(--font-mono)', fontSize: 11,
              fontWeight: 600, letterSpacing: '0.12em',
              border: activeSeries === s ? `1px solid ${SERIES_COLORS[s]}` : '1px solid var(--line)',
              background: activeSeries === s ? `${SERIES_COLORS[s]}18` : 'transparent',
              color: activeSeries === s ? 'var(--text-0)' : 'var(--text-2)',
              transition: 'all 0.15s',
            }}>{s === 'ALL' ? (lang === 'tr' ? 'Tüm Seriler' : 'All Series') : s + ' Serisi'}</button>
          ))}
          <span className="mono" style={{ marginLeft: 'auto', fontSize: 10, color: 'var(--text-3)', flexShrink: 0 }}>
            {filtered.length} {lang === 'tr' ? 'dosya' : 'files'}
          </span>
        </div>
      </div>

      {/* Content */}
      <div style={{ minHeight: '60vh', background: 'var(--bg-0)', padding: '48px 0 80px' }}>
        <div className="container">
          {Object.keys(CAT_META).map(cat => {
            const items = grouped[cat];
            if (!items || items.length === 0) return null;
            const meta = CAT_META[cat];
            return (
              <div key={cat} style={{ marginBottom: 56 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 24, paddingBottom: 16, borderBottom: '1px solid var(--line)' }}>
                  <span style={{ color: meta.color }}>{meta.icon}</span>
                  <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 500, letterSpacing: '-0.01em' }}>{meta.label}</h2>
                  <span className="mono" style={{ fontSize: 10, color: 'var(--text-3)', letterSpacing: '0.2em', marginLeft: 4 }}>{items.length} DOSYA</span>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(380px, 1fr))', gap: 1, background: 'var(--line)', border: '1px solid var(--line)' }}>
                  {items.map(d => (
                    <DownloadCard key={d.id} d={d} meta={meta} lang={lang} onDownload={handleDownload} />
                  ))}
                </div>
              </div>
            );
          })}
          {filtered.length === 0 && (
            <div style={{ textAlign: 'center', padding: '80px 0', color: 'var(--text-3)' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.2em', marginBottom: 16 }}>
                {lang === 'tr' ? 'SONUÇ BULUNAMADI' : 'NO RESULTS FOUND'}
              </div>
              <button onClick={() => { setSearch(''); setActiveCat('all'); setActiveSeries('ALL'); }}
                className="btn btn-ghost" style={{ fontSize: 13 }}>
                {lang === 'tr' ? 'Filtreleri temizle' : 'Clear filters'}
              </button>
            </div>
          )}
        </div>
      </div>

      <Footer t={window.I18N[lang]} />
      <WhatsApp lang={lang} />
    </div>
  );
}

function DownloadCard({ d, meta, lang, onDownload }) {
  const [hover, setHover] = useState(false);
  const seriesColor = SERIES_COLORS[d.series] || 'var(--magenta)';

  return (
    <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: hover ? 'var(--bg-2)' : 'var(--bg-1)',
        padding: '24px 24px',
        display: 'flex', flexDirection: 'column', gap: 12,
        transition: 'background 0.2s',
        position: 'relative',
      }}>
      {/* Top row */}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16 }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            {d.series !== 'ALL' && (
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 9, fontWeight: 700,
                letterSpacing: '0.18em', color: seriesColor,
                padding: '2px 7px', border: `1px solid ${seriesColor}50`,
                background: `${seriesColor}10`,
              }}>{d.series}</span>
            )}
            <span style={{
              fontFamily: 'var(--font-mono)', fontSize: 9,
              letterSpacing: '0.18em', color: 'var(--text-3)', textTransform: 'uppercase',
            }}>{d.type}</span>
          </div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 500, letterSpacing: '-0.01em', lineHeight: 1.3 }}>{d.title}</div>
        </div>
      </div>

      {/* Desc */}
      <p style={{ fontSize: 13, color: 'var(--text-1)', lineHeight: 1.5 }}>{d.desc}</p>

      {/* Meta row */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginTop: 4 }}>
        <span className="mono" style={{ fontSize: 10, color: 'var(--text-3)' }}>{d.version}</span>
        <span className="mono" style={{ fontSize: 10, color: 'var(--text-3)' }}>{d.size}</span>
        <span className="mono" style={{ fontSize: 10, color: 'var(--text-3)' }}>{d.date}</span>
        {d.lang && d.lang !== '-' && (
          <span className="mono" style={{ fontSize: 10, color: 'var(--text-3)' }}>{d.lang}</span>
        )}
        <div style={{ flex: 1 }} />
        <button style={{
          display: 'flex', alignItems: 'center', gap: 6,
          padding: '8px 14px',
          background: hover ? meta.color : 'transparent',
          border: `1px solid ${hover ? meta.color : 'var(--line-strong)'}`,
          color: hover ? 'white' : 'var(--text-1)',
          fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.15em',
          transition: 'all 0.2s',
        }}
        onClick={() => onDownload(d)}>
          <DownloadIcon />
          {lang === 'tr' ? 'İNDİR' : 'DOWNLOAD'}
        </button>
      </div>
    </div>
  );
}

const loader = document.getElementById('root-loading');
if (loader) loader.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<DownloadsApp />);
</script>
</body>
</html>
